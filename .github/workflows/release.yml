name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            make_target: build-windows
          - platform: linux-x64
            make_target: build-linux
          - platform: macos-x64
            make_target: build-mac

    env:
      DOCKER_BUILDKIT: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must use the vMAJOR.MINOR.PATCH format, for example v1.0.0." >&2
            exit 1
          fi

          version="${tag#v}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "DIST_ROOT=dist/v${version//./}" >> "$GITHUB_ENV"

      - name: Sync package version to release tag
        run: npm version --no-git-tag-version --allow-same-version "$RELEASE_VERSION"

      - name: Build ${{ matrix.platform }}
        run: make ${{ matrix.make_target }}

      - name: Package ${{ matrix.platform }} artifact
        shell: bash
        run: |
          mkdir -p release "release/staging/${{ matrix.platform }}"

          case "${{ matrix.platform }}" in
            windows-x64)
              cp "$DIST_ROOT/windows-x64/omniport-single.exe" "release/staging/${{ matrix.platform }}/omniport.exe"
              (
                cd "release/staging/${{ matrix.platform }}"
                zip -9 -q "../../OmniPort-${RELEASE_TAG}-${{ matrix.platform }}.zip" omniport.exe
              )
              ;;
            linux-x64)
              cp "$DIST_ROOT/linux-x64/omniport-single-linux-x64" "release/staging/${{ matrix.platform }}/omniport"
              chmod +x "release/staging/${{ matrix.platform }}/omniport"
              tar -C "release/staging/${{ matrix.platform }}" -czf "release/OmniPort-${RELEASE_TAG}-${{ matrix.platform }}.tar.gz" omniport
              ;;
            macos-x64)
              cp "$DIST_ROOT/mac-x64/omniport-single-mac-x64" "release/staging/${{ matrix.platform }}/omniport"
              chmod +x "release/staging/${{ matrix.platform }}/omniport"
              tar -C "release/staging/${{ matrix.platform }}" -czf "release/OmniPort-${RELEASE_TAG}-${{ matrix.platform }}.tar.gz" omniport
              ;;
            *)
              echo "Unsupported platform: ${{ matrix.platform }}" >&2
              exit 1
              ;;
          esac

          sha256sum release/OmniPort-"${RELEASE_TAG}"-"${{ matrix.platform }}"* > "release/OmniPort-${RELEASE_TAG}-${{ matrix.platform }}.sha256"

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/OmniPort-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
          else
            gh release create "$tag" release/* \
              --title "OmniPort $tag" \
              --generate-notes
          fi
